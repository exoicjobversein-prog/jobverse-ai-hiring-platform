version: '3.8'

services:
  # Internal Redis broker. Using the external instance by default in .env,
  # but keeping this for local development if needed.
  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    env_file:
      - .env
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"

  celery_worker:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - .env
    command: celery -A core worker -l info
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
